<!DOCTYPE html>
<html>
<head>
    <title>Lumière — Delivery</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600&family=Lato:wght@300;400&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #0a0a0a; color: #eee; font-family: 'Lato', sans-serif; min-height: 100vh; }

        .header {
            background: #111; border-bottom: 1px solid #222;
            padding: 16px 28px; display: flex; align-items: center;
            justify-content: space-between; position: sticky; top: 0; z-index: 100;
        }
        .header-left { display: flex; align-items: center; gap: 14px; }
        .header h1 { font-family: 'Cormorant Garamond', serif; font-size: 22px; color: #c8a96a; letter-spacing: 1px; }
        .badge { background: #1a1f35; border: 1px solid #3b82f644; color: #93c5fd; font-size: 11px; padding: 4px 10px; border-radius: 20px; letter-spacing: 1px; text-transform: uppercase; }
        .header-right { display: flex; align-items: center; gap: 16px; }
        .live-dot { display: flex; align-items: center; gap: 7px; font-size: 12px; color: #aaa; }
        .live-dot span { width: 8px; height: 8px; background: #22c55e; border-radius: 50%; display: inline-block; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.8)} }
        .nav-links { display: flex; gap: 10px; }
        .nav-links a { background: #1a1a1a; border: 1px solid #2a2a2a; color: #aaa; text-decoration: none; padding: 7px 14px; border-radius: 8px; font-size: 12px; transition: all .2s; }
        .nav-links a:hover { border-color: #c8a96a; color: #c8a96a; }

        .main { padding: 24px 28px; max-width: 1000px; margin: 0 auto; }

        .stats-bar { display: flex; gap: 14px; margin-bottom: 28px; flex-wrap: wrap; }
        .stat-pill { background: #111; border: 1px solid #222; border-radius: 10px; padding: 12px 20px; }
        .stat-pill .num { font-size: 22px; font-weight: 700; color: #c8a96a; font-family: 'Cormorant Garamond', serif; }
        .stat-pill .label { font-size: 11px; color: #666; text-transform: uppercase; letter-spacing: .8px; }

        .section-title { font-family: 'Cormorant Garamond', serif; font-size: 16px; color: #c8a96a; letter-spacing: 1px; margin: 0 0 14px; padding-bottom: 8px; border-bottom: 1px solid #1a1a1a; }
        .section-wrap { margin-bottom: 32px; }
        .empty-section { color: #444; font-size: 13px; padding: 16px 0; }

        .orders-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 18px; }

        .order-card { background: #0d1525; border: 1px solid #3b82f622; border-radius: 14px; overflow: hidden; }
        .order-card.ready    { border-left: 3px solid #f97316; }
        .order-card.delivered { border-left: 3px solid #22c55e; opacity: .7; }

        .order-card-header { padding: 14px 16px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #1a2035; }
        .order-id { font-family: 'Cormorant Garamond', serif; font-size: 18px; color: #c8a96a; font-weight: 600; }

        .status-chip { font-size: 11px; padding: 3px 10px; border-radius: 20px; font-weight: 600; letter-spacing: .5px; text-transform: uppercase; }
        .status-chip.ready     { background: #431407; color: #fb923c; }
        .status-chip.delivered { background: #14532d; color: #4ade80; }

        .order-card-body { padding: 14px 16px; }

        .address-block {
            background: #0a1020; border: 1px solid #3b82f633; border-radius: 10px;
            padding: 12px 14px; margin-bottom: 12px;
        }
        .address-label { font-size: 10px; color: #3b82f6; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 5px; }
        .address-text { font-size: 13px; color: #93c5fd; line-height: 1.6; }

        .item-row { display: flex; align-items: center; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid #1a2035; font-size: 13px; }
        .item-row:last-child { border-bottom: none; }
        .item-name { color: #ddd; }
        .item-qty { background: #1a2035; color: #c8a96a; font-weight: 700; font-size: 12px; padding: 2px 9px; border-radius: 20px; }

        .order-total { margin-top: 10px; padding-top: 10px; border-top: 1px solid #1a2035; display: flex; justify-content: space-between; font-size: 14px; }
        .order-total .amount { color: #c8a96a; font-weight: 700; font-family: 'Cormorant Garamond', serif; font-size: 17px; }

        .order-note { margin-top: 8px; background: #1a1a1a; border-left: 2px solid #c8a96a; padding: 8px 10px; font-size: 12px; color: #aaa; border-radius: 0 6px 6px 0; }

        .order-card-footer { padding: 12px 16px; border-top: 1px solid #1a2035; display: flex; align-items: center; justify-content: space-between; }
        .order-time { font-size: 11px; color: #555; }

        .btn-delivered { background: #14532d; color: #4ade80; border: 1px solid #16a34a; padding: 9px 20px; border-radius: 8px; font-size: 13px; font-weight: 700; cursor: pointer; transition: all .2s; }
        .btn-delivered:hover { background: #16a34a; color: #fff; }
        .btn-delivered:disabled { opacity: .5; cursor: default; }

        .ready-badge { background: #431407; color: #fb923c; font-size: 10px; padding: 2px 8px; border-radius: 20px; font-weight: 700; letter-spacing: .5px; text-transform: uppercase; animation: blink 1s infinite; }
        @keyframes blink { 0%,100%{opacity:1}50%{opacity:.4} }

        .empty-state { text-align: center; padding: 80px 20px; color: #444; }
        .empty-state .icon { font-size: 52px; margin-bottom: 14px; }
        .empty-state p { font-size: 15px; }
    </style>
</head>
<body>

<div class="header">
    <div class="header-left">
        <h1>🍴 Lumière</h1>
        <span class="badge">🛵 Delivery Panel</span>
    </div>
    <div class="header-right">
        <div class="live-dot"><span></span> Live — auto refreshes every 8s</div>
        <div class="nav-links">
            <a href="/kitchen">🍳 Kitchen</a>
            <a href="/billing">💳 Billing</a>
        </div>
    </div>
</div>

<div class="main">
    <div class="stats-bar">
        <div class="stat-pill"><div class="num" id="statReady">0</div><div class="label">Ready to Deliver</div></div>
        <div class="stat-pill"><div class="num" id="statDelivered">0</div><div class="label">Delivered Today</div></div>
    </div>

    <!-- Ready for pickup -->
    <div class="section-wrap">
        <div class="section-title">📦 Ready for Pickup — Mark as Delivered</div>
        <div id="readySection"><p class="empty-section">No orders ready yet.</p></div>
    </div>

    <!-- Already delivered today -->
    <div class="section-wrap">
        <div class="section-title">✅ Delivered Today</div>
        <div id="deliveredSection"><p class="empty-section">No deliveries yet today.</p></div>
    </div>
</div>

<script>
function timeSince(dateStr) {
    var d = new Date(dateStr);
    var secs = Math.floor((new Date() - d) / 1000);
    if (secs < 60) return secs + 's ago';
    if (secs < 3600) return Math.floor(secs / 60) + 'm ago';
    return Math.floor(secs / 3600) + 'h ago';
}

function isToday(dateStr) {
    var d = new Date(dateStr), n = new Date();
    return d.getDate() === n.getDate() && d.getMonth() === n.getMonth() && d.getFullYear() === n.getFullYear();
}

function markDelivered(id, btn) {
    btn.disabled = true;
    btn.textContent = '…';
    fetch('/delivery/action/' + id + '/delivered', { method: 'POST' })
        .then(function(r) { return r.json(); })
        .then(function(d) { if (d.success) loadOrders(); })
        .catch(function() { btn.disabled = false; btn.textContent = '✅ Mark Delivered'; });
}

function buildCard(o, showBtn) {
    var html =
        '<div class="order-card ' + o.status + '">' +
        '<div class="order-card-header">' +
            '<div style="display:flex;align-items:center;gap:8px;">' +
                '<span class="order-id">#' + o.id + '</span>' +
                (o.status === 'ready' ? '<span class="ready-badge">READY</span>' : '') +
            '</div>' +
            '<span class="status-chip ' + o.status + '">' +
                (o.status === 'ready' ? '📦 Ready' : '✅ Delivered') +
            '</span>' +
        '</div>' +
        '<div class="order-card-body">' +
            '<div class="address-block">' +
                '<div class="address-label">Deliver To</div>' +
                '<div class="address-text">📍 ' + (o.delivery_address || 'Address not available') + '</div>' +
            '</div>';

    o.items.forEach(function(item) {
        html +=
            '<div class="item-row">' +
                '<span class="item-name">' + item.name + '</span>' +
                '<span class="item-qty">×' + item.qty + '</span>' +
            '</div>';
    });

    if (o.note) {
        html += '<div class="order-note">📝 ' + o.note + '</div>';
    }

    html +=
        '<div class="order-total">' +
            '<span style="color:#aaa;font-size:13px;">Total</span>' +
            '<span class="amount">₹' + o.total + '</span>' +
        '</div>' +
        '</div>' +
        '<div class="order-card-footer">' +
            '<span class="order-time">🕐 ' + timeSince(o.created) + '</span>';

    if (showBtn) {
        html += '<button class="btn-delivered" onclick="markDelivered(' + o.id + ', this)">✅ Mark Delivered</button>';
    } else {
        html += '<span style="font-size:12px;color:#4ade80;">✅ Delivered</span>';
    }

    html += '</div></div>';
    return html;
}

function loadOrders() {
    fetch('/delivery/poll')
        .then(function(r) { return r.json(); })
        .then(function(orders) {
            var ready     = orders.filter(function(o) { return o.status === 'ready'; });
            var delivered = orders.filter(function(o) { return o.status === 'delivered' && isToday(o.created); });

            document.getElementById('statReady').textContent     = ready.length;
            document.getElementById('statDelivered').textContent = delivered.length;

            var rs = document.getElementById('readySection');
            var ds = document.getElementById('deliveredSection');

            if (ready.length === 0) {
                rs.innerHTML = '<p class="empty-section">No orders ready for pickup yet.</p>';
            } else {
                var h = '<div class="orders-grid">';
                ready.forEach(function(o) { h += buildCard(o, true); });
                rs.innerHTML = h + '</div>';
            }

            if (delivered.length === 0) {
                ds.innerHTML = '<p class="empty-section">No deliveries completed today.</p>';
            } else {
                var h2 = '<div class="orders-grid">';
                delivered.forEach(function(o) { h2 += buildCard(o, false); });
                ds.innerHTML = h2 + '</div>';
            }
        });
}

loadOrders();
setInterval(loadOrders, 8000);
</script>
</body>
</html>
